<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>OriginalPicDownloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #fff;
      color: #1a1a1a;
      width: 320px;
      min-height: 80px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #e1e4e8;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    #settings-link {
      color: #666;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 4px;
      border-radius: 4px;
      transition: background 0.1s;
    }

    #settings-link:hover { background: #f0f0f0; }

    #status-area {
      padding: 14px;
      color: #666;
      font-size: 13px;
      text-align: center;
    }

    #image-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 10px;
    }

    .preview-item {
      position: relative;
      background: #f0f0f0;
      border-radius: 6px;
      overflow: hidden;
      aspect-ratio: 1;
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .preview-item .item-dl-btn {
      position: absolute;
      bottom: 5px;
      right: 5px;
      background: rgba(0,0,0,0.65);
      border: none;
      border-radius: 5px;
      padding: 4px 6px;
      cursor: pointer;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .preview-item:hover .item-dl-btn { opacity: 1; }

    footer {
      padding: 10px 14px;
      border-top: 1px solid #e1e4e8;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #download-all-btn {
      flex: 1;
      padding: 7px 0;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    #download-all-btn:hover { background: #1d55d4; }
    #download-all-btn:disabled { background: #aaa; cursor: default; }

    #image-count {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
    }

    .shortcut-hint {
      padding: 0 14px 10px;
      font-size: 11px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span data-i18n="appName">OriginalPicDownloader</span>
    </div>
    <a id="settings-link" href="options.html" target="_blank" data-i18n-title="settingsLinkTitle" title="">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33
                 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33
                 l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4
                 h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06
                 A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51
                 a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9
                 a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </a>
  </header>

  <div id="status-area" data-i18n="statusHoverPrompt"></div>
  <div id="image-grid" hidden></div>

  <footer id="footer" hidden>
    <button id="download-all-btn" data-i18n="btnDownloadAll"></button>
    <span id="image-count"></span>
  </footer>

  <div class="shortcut-hint" data-i18n="shortcutHint"></div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
